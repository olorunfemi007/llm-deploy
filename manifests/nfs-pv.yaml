apiVersion: v1
kind: PersistentVolume
metadata:
  name: llm-models-pv
  labels:
    app.kubernetes.io/name: llm-models
    app.kubernetes.io/part-of: llm-stack
spec:
  capacity:
    storage: 25Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  nfs:
    server: 10.0.0.10
    path: /srv/nfs/k8s
