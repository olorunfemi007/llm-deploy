name: Terraform

on:
  push:
    branches: [main]
    paths:
      - terraform/**
      - manifests/**
      - Dockerfile.rpc
      - .github/workflows/terraform.yml
  pull_request:
    branches: [main]
    paths:
      - terraform/**
      - manifests/**
      - Dockerfile.rpc
      - .github/workflows/terraform.yml
  workflow_dispatch:
    inputs:
      action:
        description: "Action to perform"
        required: true
        type: choice
        options:
          - plan
          - apply
          - destroy
      confirm_destroy:
        description: "Type 'destroy' to confirm infrastructure destruction"
        required: false
        type: string

env:
  TF_WORKING_DIR: terraform
  GCP_PROJECT_ID: llm-deploy-499913
  TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: llm-deploy-sa@llm-deploy-499913.iam.gserviceaccount.com

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform init \
            -backend-config="bucket=${{ env.TF_STATE_BUCKET }}" \
            -backend-config="prefix=terraform/state"

      - name: Terraform Validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate

      - name: Terraform Plan
        id: plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform plan \
            -var="project_id=${{ env.GCP_PROJECT_ID }}" \
            -var="state_bucket=${{ env.TF_STATE_BUCKET }}" \
            -var="service_account_email=llm-deploy-sa@llm-deploy-499913.iam.gserviceaccount.com" \
            -var="domain=${{ secrets.DOMAIN }}" \
            -var="enable_tls=${{ secrets.ENABLE_TLS || 'false' }}" \
            -no-color \
            -out=tfplan 2>&1 | tee /tmp/plan_output.txt
        continue-on-error: true

      - name: Post Plan to PR
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        env:
          PLAN_OUTCOME: ${{ steps.plan.outcome }}
        with:
          script: |
            const fs = require('fs');
            let planOutput = '';
            try {
              planOutput = fs.readFileSync('/tmp/plan_output.txt', 'utf8');
            } catch (e) {
              planOutput = 'Plan output not available';
            }
            if (planOutput.length > 60000) {
              planOutput = planOutput.substring(0, 60000) + '\n... (truncated)';
            }
            const output = `#### Terraform Plan \`${process.env.PLAN_OUTCOME}\`\n<details><summary>Show Plan</summary>\n\n\`\`\`\n${planOutput}\n\`\`\`\n</details>`;
            const { data: comments } = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const existing = comments.find(c => c.body.includes('#### Terraform Plan'));
            if (existing) {
              await github.rest.issues.updateComment({
                comment_id: existing.id,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: output,
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: output,
              });
            }

      - name: Plan Status
        if: steps.plan.outcome == 'failure'
        run: exit 1

  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: terraform-plan
    if: |
      (github.ref == 'refs/heads/main' && github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: llm-deploy-sa@llm-deploy-499913.iam.gserviceaccount.com

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform init \
            -backend-config="bucket=${{ env.TF_STATE_BUCKET }}" \
            -backend-config="prefix=terraform/state"

      - name: Terraform Apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform apply -auto-approve \
            -var="project_id=${{ env.GCP_PROJECT_ID }}" \
            -var="state_bucket=${{ env.TF_STATE_BUCKET }}" \
            -var="service_account_email=llm-deploy-sa@llm-deploy-499913.iam.gserviceaccount.com" \
            -var="domain=${{ secrets.DOMAIN }}" \
            -var="enable_tls=${{ secrets.ENABLE_TLS || 'false' }}"

  build-rpc-image:
    name: Build & Push RPC Image
    runs-on: ubuntu-latest
    needs: terraform-apply
    if: |
      (github.ref == 'refs/heads/main' && github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: llm-deploy-sa@llm-deploy-499913.iam.gserviceaccount.com

      - name: Configure Docker auth
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build and Push RPC Image
        run: |
          docker build -f Dockerfile.rpc \
            -t us-central1-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/llm-images/llama-rpc-server:latest \
            -t us-central1-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/llm-images/llama-rpc-server:${{ github.sha }} \
            .
          docker push us-central1-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/llm-images/llama-rpc-server:latest
          docker push us-central1-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/llm-images/llama-rpc-server:${{ github.sha }}

  deploy-manifests:
    name: Deploy K8s Manifests
    runs-on: ubuntu-latest
    needs: build-rpc-image
    if: |
      (github.ref == 'refs/heads/main' && github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: llm-deploy-sa@llm-deploy-499913.iam.gserviceaccount.com

      - name: Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy manifests via control plane
        run: |
          gcloud compute scp --recurse manifests/ \
            k8s-control-plane:/tmp/manifests \
            --zone=us-central1-a --quiet

          gcloud compute ssh k8s-control-plane --zone=us-central1-a --quiet --command="
            sudo kubectl apply -f /tmp/manifests/namespace.yaml
            sudo kubectl apply -f /tmp/manifests/nfs-pv.yaml
            sudo kubectl apply -f /tmp/manifests/nfs-pvc.yaml
            sudo kubectl apply -f /tmp/manifests/configmap.yaml
            sudo kubectl apply -f /tmp/manifests/rpc-worker.yaml
            sudo kubectl apply -f /tmp/manifests/deployment.yaml
            sudo kubectl apply -f /tmp/manifests/service.yaml
            sudo kubectl apply -f /tmp/manifests/ingress.yaml
            rm -rf /tmp/manifests
          "

      - name: Verify deployment
        run: |
          gcloud compute ssh k8s-control-plane --zone=us-central1-a --quiet --command="
            sudo kubectl rollout restart statefulset/llama-rpc-worker -n llm-inference
            sudo kubectl rollout restart deploy/llama-server -n llm-inference
            sudo kubectl rollout status statefulset/llama-rpc-worker -n llm-inference --timeout=120s
            sudo kubectl rollout status deploy/llama-server -n llm-inference --timeout=300s
            sudo kubectl get pods -n llm-inference -o wide
          "

  terraform-destroy:
    name: Terraform Destroy
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'destroy' && github.event.inputs.confirm_destroy == 'destroy'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: llm-deploy-sa@llm-deploy-499913.iam.gserviceaccount.com

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform init \
            -backend-config="bucket=${{ env.TF_STATE_BUCKET }}" \
            -backend-config="prefix=terraform/state"

      - name: Terraform Destroy
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform destroy -auto-approve \
            -var="project_id=${{ env.GCP_PROJECT_ID }}" \
            -var="state_bucket=${{ env.TF_STATE_BUCKET }}" \
            -var="service_account_email=llm-deploy-sa@llm-deploy-499913.iam.gserviceaccount.com" \
            -var="domain=${{ secrets.DOMAIN }}" \
            -var="enable_tls=${{ secrets.ENABLE_TLS || 'false' }}"

      - name: Clean up join command
        run: gcloud storage rm gs://${{ env.TF_STATE_BUCKET }}/k8s/join-command.sh --quiet || true
